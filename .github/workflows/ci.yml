name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  test:
    name: pytest (offline suite)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt -r requirements-dev.txt

      - name: Run tests
        run: pytest tests/ -q

# Note: the MLflow LLM-judge eval (`eval/run_eval.py`) needs a live Databricks
# workspace + FMAPI endpoints, so it can't run in vanilla CI. Run it pre-deploy
# with `databricks bundle run eval_full -t <target>` (the release gate).
